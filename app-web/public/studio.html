<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gamer Hut · Creative Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Red+Hat+Display:wght@300;400;500;600;700;800;900&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:#0B0B0A; }
  body{ font-family:'Red Hat Display',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  #root{ height:100vh; }
  .gh-display{ font-family:'Russo One',sans-serif; font-weight:900; }
  .gh-pixel{ font-family:'Press Start 2P',monospace; font-weight:400; }
  .gh-mono{ font-family:'JetBrains Mono',monospace; }
  .gh-body{ font-family:'Red Hat Display',sans-serif; }
  ::-webkit-scrollbar{ width:10px; }
  ::-webkit-scrollbar-track{ background:#0B0B0A; }
  ::-webkit-scrollbar-thumb{ background:#2a2622; border-radius:8px; }
  ::-webkit-scrollbar-thumb:hover{ background:#3a352f; }
  button{ font-family:inherit; }
  input[type=range]{ height:4px; }
  /* hide babel-uncompiled flash */
  #root:empty::after{ content:'GAMER HUT'; font-family:'Press Start 2P',monospace; color:#E8643C;
    font-size:14px; position:fixed; inset:0; display:grid; place-items:center; }
</style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#0B0B0A"/>
      <g fill="none" stroke="#E8643C" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
        <path d="M30 38 h12 v6 h-6 v8 h6 v-4 M50 38 v18 M50 47 h10 M60 38 v18 M70 38 l-6 18"/>
      </g>
      <rect x="30" y="64" width="40" height="6" fill="#E8643C"/>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
  <script src="config.js"></script>
  <script src="generation-context.js"></script>
  <script src="brand-voice.js"></script>

  <script type="text/babel" src="app/data.jsx"></script>
  <script type="text/babel" src="app/preview.jsx"></script>
  <script type="text/babel" src="app/controls.jsx"></script>
  <script type="text/babel" src="app/panel.jsx"></script>
  <script type="text/babel" src="app/app.jsx"></script>
</body>
</html>
